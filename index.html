<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng ký tư vấn</title><link rel="stylesheet" href="style.css"></head>
<body><div class="card">
<h1>ĐĂNG KÝ TƯ VẤN</h1><p>CÙNG NONWRITER</p>
<form id="f">
<input id="name" placeholder="Tên của bạn" required>
<input id="phone" placeholder="Số điện thoại" required>
<input id="website" placeholder="Website hoặc Fanpage" required>
<input id="service" placeholder="Bạn cần tư vấn gì?" required>
<textarea id="message" placeholder="Lời nhắn" required></textarea>
<button type="submit">Gửi</button>
</form></div><script src="script.js"></script></body></html>
